<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noni Media | Photography</title>
    <style>
        /* Base Styles & Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            line-height: 1.6;
        }

        a {
            text-decoration: none;
            color: #ffffff;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #aaaaaa;
        }

        /* Navigation */
        header {
            position: fixed;
            width: 100%;
            top: 0;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1516035069371-29a1b244cc32?q=80&w=2000&auto=format&fit=crop') center/cover;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #cccccc;
        }

        .btn {
            padding: 15px 30px;
            background-color: #ffffff;
            color: #0a0a0a;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #cccccc;
            transform: translateY(-3px);
        }

        /* Section Formatting */
        section {
            padding: 100px 50px;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        /* Portfolio Grid */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .portfolio-item {
            position: relative;
            overflow: hidden;
            border-radius: 5px;
            height: 400px;
        }

        .portfolio-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .portfolio-item:hover img {
            transform: scale(1.05);
        }

        /* Pricing Packages */
        .pricing-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .pricing-card {
            background: #1a1a1a;
            padding: 40px 30px;
            width: 300px;
            text-align: center;
            border-radius: 8px;
            border: 1px solid #333;
            transition: transform 0.3s ease;
        }

        .pricing-card:hover {
            transform: translateY(-10px);
            border-color: #fff;
        }

        .pricing-card h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        .pricing-card .price {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .pricing-card ul {
            list-style: none;
            margin-bottom: 30px;
            color: #aaaaaa;
        }

        .pricing-card ul li {
            margin-bottom: 10px;
        }

        /* Contact Section */
        .contact-container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        input,
        textarea {
            width: 100%;
            padding: 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            font-size: 1rem;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #fff;
        }

        .social-link {
            font-size: 1.2rem;
            display: inline-block;
            margin-top: 20px;
            border-bottom: 1px solid #fff;
            padding-bottom: 5px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px;
            background: #050505;
            color: #555;
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                padding: 20px;
                flex-direction: column;
                gap: 15px;
            }

            section {
                padding: 60px 20px;
            }

            .hero h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">Noni Media</div>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#portfolio">Portfolio</a></li>
                <li><a href="#packages">Packages</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <h1>Noni Media</h1>
        <p>Capturing the Spirit of the Moment</p>
        <a href="#contact" class="btn">Book a Session</a>
    </section>

    <section id="portfolio">
        <h2 class="section-title">Selected Works</h2>
        <div class="portfolio-grid">
            <div class="portfolio-item"><img
                    src="https://images.unsplash.com/photo-1511895426328-dc8714191300?q=80&w=800&auto=format&fit=crop"
                    alt="Portrait"></div>
            <div class="portfolio-item"><img
                    src="https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=800&auto=format&fit=crop"
                    alt="Wedding"></div>
            <div class="portfolio-item"><img
                    src="https://images.unsplash.com/photo-1532712938310-34cb3982ef74?q=80&w=800&auto=format&fit=crop"
                    alt="Event"></div>
            <div class="portfolio-item"><img
                    src="https://images.unsplash.com/photo-1537151608828-ea2b11777ee8?q=80&w=800&auto=format&fit=crop"
                    alt="Commercial"></div>
            <div class="portfolio-item"><img
                    src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?q=80&w=800&auto=format&fit=crop"
                    alt="Portrait 2"></div>
            <div class="portfolio-item"><img
                    src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?q=80&w=800&auto=format&fit=crop"
                    alt="Wedding 2"></div>
        </div>
    </section>

    <section id="packages">
        <h2 class="section-title">Investment Packages</h2>
        <div class="pricing-grid">
            <div class="pricing-card">
                <h3>Standard Portrait</h3>
                <div class="price">₦75,000</div>
                <h3>Wedding shoot</h3>
                <div class="price">₦250,000</div>
                <ul>
                    <li>1 Hour Session
